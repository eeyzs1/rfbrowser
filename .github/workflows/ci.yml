name: RFBrowser CI/CD

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.41.6'

jobs:
  analyze:
    name: Analyze & Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - run: flutter gen-l10n
      - run: dart format --set-exit-if-changed .
      - run: flutter analyze --no-pub --fatal-infos

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: analyze
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - run: flutter gen-l10n
      - run: flutter test --no-pub --coverage
      - uses: codecov/codecov-action@v4
        if: github.event_name == 'push'
        with:
          files: coverage/lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: test
    if: github.event_name == 'push'
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - run: flutter gen-l10n
      - run: flutter build windows --release
      - uses: actions/upload-artifact@v4
        with:
          name: rfbrowser-windows
          path: build/windows/x64/runner/Release/
          retention-days: 30

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev libsecret-1-dev libjsoncpp-dev
      - run: flutter pub get
      - run: flutter gen-l10n
      - run: flutter build linux --release
      - uses: actions/upload-artifact@v4
        with:
          name: rfbrowser-linux
          path: build/linux/x64/release/bundle/
          retention-days: 30

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle-wrapper.properties') }}
          restore-keys: gradle-
      - run: flutter pub get
      - run: flutter gen-l10n
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: rfbrowser-android
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-linux, build-android]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    timeout-minutes: 5
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: rfbrowser-windows
          path: dist/windows/
      - uses: actions/download-artifact@v4
        with:
          name: rfbrowser-linux
          path: dist/linux/
      - uses: actions/download-artifact@v4
        with:
          name: rfbrowser-android
          path: dist/android/
      - name: Create release archive
        run: |
          cd dist/windows && zip -r ../../rfbrowser-windows.zip . && cd ../..
          cd dist/linux && tar czf ../../rfbrowser-linux.tar.gz . && cd ../..
          mv dist/android/app-release.apk rfbrowser-android.apk
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            rfbrowser-windows.zip
            rfbrowser-linux.tar.gz
            rfbrowser-android.apk
          generate_release_notes: true
