name: rfbrowser
description: "RFBrowser - AI-powered knowledge browser"
publish_to: 'none'
version: 0.2.0+2

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  cupertino_icons: ^1.0.8

