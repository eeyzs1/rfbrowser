version: 1
description: Architecture constraint rules — dependency direction and layer boundaries
rules:
  - id: AR001
    description: "No business logic in presentation layer"
    pattern: "(?:(?:def|class)\\s+\\w+.*(?:business|calculate|process|validate)_)"
    file_pattern: "src/(?:components|views|pages)/**"
    severity: error

  - id: AR002
    description: "No direct database access from frontend"
    pattern: "(?:import.*(?:sql|database|db|prisma|sequelize|typeorm).*from)"
    file_pattern: "src/(?:components|views|pages)/**"
    severity: error

  - id: AR003
    description: "API layer must not contain business logic"
    pattern: "(?:def|function)\\s+(?:calculate|process|validate|transform)"
    file_pattern: "src/(?:routes|controllers|handlers)/**"
    severity: warning

  - id: AR004
    description: "All API endpoints must have input validation"
    pattern: ""
    file_pattern: "src/(?:routes|controllers|handlers)/**"
    check: "every endpoint function must call a validation function"
    severity: warning

  - id: AR005
    description: "No circular dependencies between modules"
    check: "import graph must be a DAG"
    severity: error

dependency_direction:
  allowed:
    - "frontend → api"
    - "api → service"
    - "service → repository"
    - "repository → database"
  forbidden:
    - "database → repository"
    - "repository → service"
    - "service → api"
    - "api → frontend"
    - "frontend → database"
