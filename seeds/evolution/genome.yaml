    max_context_lines: 60
    handoff_format: "structured YAML"
  domain_specific_roles:
    planner:
      responsibilities: ["design Flutter widget contracts", "define component structure", "create task decomposition"]
    executor:
      responsibilities: ["implement Flutter widgets", "write Dart code", "fix bugs", "run flutter analyze"]
    verifier:
      responsibilities: ["run flutter test", "check consistency", "validate AGENTS.md rule compliance"]
