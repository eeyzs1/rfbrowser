version: 1
description: "RFBrowser domain advancement stages — guides the innovation engine"
stages:
  - name: "Basic"
    description: "Project compiles and runs, basic features work"
    innovations: []
    completed_when:
      - "flutter analyze passes with 0 issues"
      - "All components have at least one data flow path (A-1)"

  - name: "Solid"
    description: "Code quality and performance baselines established"
    innovations:
      - id: "INN-PERF-001"
        name: "Performance profiling"
        description: "Add frame-level performance monitoring to detect jank in canvas, editor, and webview"
        category: "performance"
        effort: "medium"
        impact: "high"
        trigger: "Canvas and webview are performance-sensitive — need metrics to prevent regression"
      - id: "INN-ARCH-002"
        name: "Component lifecycle documentation"
        description: "Generate architecture decision records (ADRs) for key component interactions"
        category: "documentation"
        effort: "low"
        impact: "medium"
        trigger: "AGENTS.md rules need traceability to code decisions"
      - id: "INN-UX-003"
        name: "Keyboard shortcut audit"
        description: "Audit all keyboard shortcuts against UX-7 rule: top 5 actions must have shortcuts"
        category: "ux"
        effort: "low"
        impact: "high"
        trigger: "Command bar is primary navigation hub — shortcuts reduce friction"
      - id: "INN-SEC-004"
        name: "Security audit for webview"
        description: "Audit all webview URL handling against S-1 rule (dangerous scheme filtering)"
        category: "security"
        effort: "medium"
        impact: "high"
        trigger: "WebView is the most security-sensitive component"
    completed_when:
      - "All AGENTS.md P-rules verified at code level"
      - "All AGENTS.md C-rules verified at code level"
      - "All AGENTS.md S-rules verified at code level"

  - name: "Advanced"
    description: "Cross-cutting concerns and system-level quality"
    innovations:
      - id: "INN-PLUG-001"
        name: "Plugin sandbox hardening"
        description: "Add resource limits, timeout enforcement, and capability-based security to plugin host"
        category: "security"
        effort: "high"
        impact: "high"
        trigger: "Plugin system accepts arbitrary user code — needs defense in depth"
      - id: "INN-DATA-002"
        name: "Vector search quality benchmarks"
        description: "Implement recall@k and MRR benchmarks for HNSW index quality regression testing"
        category: "quality"
        effort: "medium"
        impact: "medium"
        trigger: "HNSW index is core to knowledge retrieval — quality must be measurable"
      - id: "INN-SYNC-003"
        name: "Conflict resolution for multi-device sync"
        description: "Implement three-way merge for concurrent edits via Git sync"
        category: "feature"
        effort: "high"
        impact: "high"
        trigger: "Git sync exists but doesn't handle merge conflicts gracefully"
      - id: "INN-AI-004"
        name: "Streaming token buffer optimization"
        description: "Optimize AI streaming to reduce UI thread contention during token rendering"
        category: "performance"
        effort: "medium"
        impact: "high"
        trigger: "UX-4 requires real-time token streaming — needs performance optimization"
      - id: "INN-GRAPH-005"
        name: "Graph layout algorithm upgrade"
        description: "Upgrade from basic force-directed layout to stress majorization for knowledge graph"
        category: "feature"
        effort: "medium"
        impact: "medium"
        trigger: "Knowledge graph is core visualization — layout quality affects usability"
    completed_when:
      - "Plugin host passes chaos testing (random crashes, resource exhaustion)"
      - "HNSW recall@10 > 0.9 on benchmark dataset"
      - "Git merge conflict resolution tested"

  - name: "Production"
    description: "Ready for real users with monitoring, CI/CD, and documentation"
    innovations:
      - id: "INN-CI-001"
        name: "CI/CD pipeline with harness integration"
        description: "GitHub Actions workflow that runs the full harness loop (EXECUTE→PROVE→JUDGE) on every PR"
        category: "devops"
        effort: "high"
        impact: "high"
        trigger: "Harness is manual today — CI integration makes it automatic enforcement"
      - id: "INN-DOC-002"
        name: "User-facing documentation generator"
        description: "Auto-generate user docs from acceptance criteria, ADRs, and inline comments"
        category: "documentation"
        effort: "medium"
        impact: "medium"
        trigger: "UX-2 requires empty states with CTAs — docs fill the user knowledge gap"
      - id: "INN-TEST-003"
        name: "End-to-end test suite"
        description: "Build integration tests for complete workflows: browser→clip→note→graph→canvas"
        category: "quality"
        effort: "high"
        impact: "high"
        trigger: "Cross-component workflows have no automated tests"
    completed_when:
      - "CI pipeline runs on every PR with < 10 min latency"
      - "User docs cover top 10 workflows"
      - "E2E tests cover 5 critical user journeys"
