version: 1
description: "API Service domain advancement patterns — from basic to excellent"
stages:
  - name: "Basic"
    description: "Meets user requirements"
    indicators:
      - "CRUD endpoints working"
      - "Input validation passes"
      - "Error responses consistent"

  - name: "Solid"
    description: "Production-ready quality"
    innovations:
      - id: "API-I001"
        name: "Rate limiting"
        description: "Per-client rate limiting with configurable thresholds"
        category: "security"
        effort: "medium"
        impact: "high"
        trigger: "API exposed to external clients"

      - id: "API-I002"
        name: "Request logging"
        description: "Structured logging for all requests with correlation IDs"
        category: "observability"
        effort: "low"
        impact: "high"
        trigger: "no request tracing"

      - id: "API-I003"
        name: "Health check endpoint"
        description: "/health and /ready endpoints for monitoring"
        category: "reliability"
        effort: "low"
        impact: "medium"
        trigger: "no health monitoring"

      - id: "API-I004"
        name: "API key authentication"
        description: "Simple API key auth for service-to-service calls"
        category: "security"
        effort: "low"
        impact: "high"
        trigger: "no authentication on endpoints"

      - id: "API-I005"
        name: "Response compression"
        description: "Gzip compression for large JSON responses"
        category: "performance"
        effort: "low"
        impact: "medium"
        trigger: "responses over 10KB"

  - name: "Advanced"
    description: "Competitive product quality"
    innovations:
      - id: "API-I010"
        name: "Pagination with cursor"
        description: "Cursor-based pagination for large datasets"
        category: "performance"
        effort: "medium"
        impact: "high"
        trigger: "endpoints returning large lists"

      - id: "API-I011"
        name: "Webhook notifications"
        description: "Push notifications via webhooks when data changes"
        category: "integration"
        effort: "medium"
        impact: "high"
        trigger: "clients need to poll for changes"

      - id: "API-I012"
        name: "Caching layer"
        description: "Redis or in-memory caching for frequently accessed data"
        category: "performance"
        effort: "medium"
        impact: "high"
        trigger: "repeated identical queries"

      - id: "API-I013"
        name: "Background jobs"
        description: "Async processing for long-running operations"
        category: "reliability"
        effort: "medium"
        impact: "high"
        trigger: "operations taking over 5 seconds"

      - id: "API-I014"
        name: "API versioning strategy"
        description: "URL-based or header-based API versioning"
        category: "maintainability"
        effort: "medium"
        impact: "high"
        trigger: "breaking changes expected"

  - name: "Excellent"
    description: "Market-leading quality"
    innovations:
      - id: "API-I020"
        name: "GraphQL layer"
        description: "Add GraphQL alongside REST for flexible queries"
        category: "developer_experience"
        effort: "high"
        impact: "high"
        trigger: "clients need complex nested queries"

      - id: "API-I021"
        name: "Event sourcing"
        description: "Store all changes as events for full audit and replay"
        category: "reliability"
        effort: "high"
        impact: "high"
        trigger: "need for complete change history"

      - id: "API-I022"
        name: "Circuit breaker"
        description: "Circuit breaker pattern for all external dependencies"
        category: "reliability"
        effort: "medium"
        impact: "high"
        trigger: "dependencies on external services"

      - id: "API-I023"
        name: "Auto-generated SDK"
        description: "Generate client SDKs from OpenAPI spec"
        category: "developer_experience"
        effort: "medium"
        impact: "high"
        trigger: "multiple client applications"
