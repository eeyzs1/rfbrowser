    - id: US-A-2
      name: "Think 场景：AI 深度融入编辑器"
      story: |
        作为 RFBrowser 用户，
        当我在编辑笔记时，
        我希望 AI 能内联地帮我：改进当前段落、续写思路、翻译选中文本、
        修复语法，而不是在一个弹出面板中对话。
      acceptance_criteria:
        - id: AC-A-2-1
          description: "选中文本后显示 AI 操作菜单（改进/翻译/续写/语法）"
          verification: |
            testWidgets('AC-A-2-1: text selection shows inline AI actions', (tester) async {
              // 模拟 Think 场景中有活动笔记，选中一段文本
