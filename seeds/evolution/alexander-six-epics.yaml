# ============================================================================
# Epic A: 将 AI 编织进每个场景 —— "壁炉中的火焰"
# ============================================================================
Epic_A:
  id: Epic-A
  name: "将 AI 编织进每个场景"
  alexander_principle: "织入 —— 每一个房间都需要它的壁炉，AI 应该是三个场景各自的壁炉"
  alexander_quote: >
    "AI 当前是一个浮动的 FAB 按钮——一个漂浮在所有场景之上的孤岛。
    它不在捕捉中帮你理解网页，不在思考中帮你打磨文字，不在连接中发现隐藏的关系。
    它是一个无根的幽灵。"
  problem: |
    当前 AI 以 AIFloat（floating FAB + 弹出面板）形式存在，
    与场景完全脱离。每个场景的真正"壁炉"应该是 AI：
    - Capture: 网页摘要、智能摘录、页面问答
    - Think: 内联改写、续写、翻译、建议
    - Connect: 隐藏关联发现、阅读路径推荐、笔记合成
  target: |
    - 移除 AIFloat 全局浮动按钮
    - 为每个场景设计专属的 AI 交互入口
    - AI 流式输出在所有场景都能看到（UX-4）
    - 每个场景的 AI 功能有对应的快捷键

  user_stories:
    - id: US-A-1
      name: "Capture 场景：AI 帮助理解网页"
      story: |
        作为 RFBrowser 用户，
        当我在浏览器中阅读网页时，
