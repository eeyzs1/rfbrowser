# ============================================================================
# 实施建议
# ============================================================================
implementation_notes:
  order_rationale: |
    D → F → E → B → C → A 的顺序确保了：
    1. 基础先行（D: 文件移动, F: 配置整理）
    2. 死代码先清（E: 服务删减，不在死代码上重构）
    3. 核心拆分（B: 知识层拆分，为 C 准备干净的 API）
    4. 结构重组（C: 场景独立，为 A 准备场景边界）
    5. 体验升华（A: AI 融入，在所有场景都对位之后）
  
  rollback_safety: |
    每个 Epic 独立可回滚（通过 git revert）。
    如果 B-Epic 引入 bug，可以回到 B-Epic 之前的状态而保留 D, F, E 的成果。
  
  testing_strategy: |
    每个 Epic 完成后运行完整测试套件。
    在 Epic 之间不积累已知失败的测试。
    所有 AC 格式的验收标准可以用 dart test 自动化验证。
  
  estimated_total_effort: |
    Epic D: ~1 hour (纯文件移动)
    Epic F: ~1 hour (YAML 编辑 + Python 脚本修改)
    Epic E: ~3 hours (需人工审计 + 代码迁移)
    Epic B: ~5 hours (新建 3 个 Notifier + 迁移消费者)
    Epic C: ~3 hours (提取 Scene Widget + 简化 MainLayout)
    Epic A: ~6 hours (3 个场景的 AI 交互 + UI 测试)
    Total: ~19 hours
    (以上基于 AI 辅助估算, 实际取决于人工审查决策时间)
