# Epic C: 给每个场景独立的"房间" —— "房间的壁炉"
# ============================================================================
Epic_C:
  id: Epic-C
  name: "给每个场景独立的\"房间\""
  alexander_principle: "房间 —— 每个场景应该有自己的空间、自己的光线、自己的气氛"
  alexander_quote: >
    "每一个房间都需要有它的壁炉——那个让人们自然聚集的中心。
    MainLayout 把太多东西吞并到了同一个尺度上。"
  problem: |
    MainLayout（555 行）掌管了三个场景的全部渲染逻辑。
    _buildCaptureScene、_buildThinkScene、_buildConnectScene、_buildStatusBar
    全在同一个类中。SceneScaffold 只是一个薄壳。
    问题：
    1. 单个文件 555 行超出认知负荷
    2. 修改任一场景需要理解整个 MainLayout
    3. 快捷键绑定、QuickMove 执行、命令处理全混在一起
  target: |
    - MainLayout 缩减至 ~100 行：只负责 ProviderScope + SceneSwitcher + 快捷键
    - 每个场景有独立文件，自己管理布局、空状态、工具栏
    - SceneScaffold 的 builder 回调替换为具体的 Scene Widget

