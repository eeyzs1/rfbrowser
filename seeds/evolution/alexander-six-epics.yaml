      estimated_files: 12
    - id: Epic-B
      name: "分解 KnowledgeNotifier"
      reason: "在 C 之前做，因为 C（场景独立房间）会调用 B 拆分后的细分 Notifier"
      risk: medium
      estimated_files: 10
    - id: Epic-C
      name: "给每个场景独立的房间"
      reason: "纯结构重构，将 MainLayout 拆分为独立场景文件"
      risk: medium
      estimated_files: 8
    - id: Epic-A
      name: "将 AI 编织进每个场景"
      reason: "最后做，因为它依赖 C 的场景结构和 B 的细分 Notifier"
