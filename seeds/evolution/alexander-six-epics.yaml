      estimated_files: 14

# ============================================================================
# Epic D: 统一模型层 —— "正空间"
# ============================================================================
Epic_D:
  id: Epic-D
  name: "统一模型层"
  alexander_principle: "正空间 —— 每一个形状都应该是有意为之的，不是别的形状的剩余"
  alexander_quote: >
    "当两个目录并存而没有清晰的原则区分时，这不是材料的诚实——
    这是施工过程中的脚手架没有被拆除。"
  problem: |
    lib/core/model/ 和 lib/data/models/ 两个目录同时存放"模型"类，
    分裂没有结构性理由，只是历史的偶然。
    具体问题：
    - canvas_model.dart 在 core/model/
    - ai_provider.dart 在 core/model/
    - model_discovery.dart 在 core/model/
    - note.dart, link.dart 等在 data/models/
    消费者需记住"这个模型在哪个目录？"
  target: |
    建立清晰的分类原则并执行迁移：
    - lib/data/models/ — 可被持久化的数据结构（可以被序列化到文件/数据库）
    - lib/core/domain/ — 纯领域逻辑对象（算法、策略、值对象）
    所有模型文件按此原则归类，删除 core/model/ 目录。

  user_stories:
    - id: US-D-1
      name: "开发者能在一个目录找到所有数据模型"
      story: |
        作为 RFBrowser 开发者，
        我希望所有可持久化的数据模型在 lib/data/models/ 下，
        这样我不需要在两个目录之间切换来理解数据层。
      acceptance_criteria:
        - id: AC-D-1-1
          description: "canvas_model.dart 出现在 lib/data/models/ 中"
          verification: |
            test('AC-D-1-1: canvas_model.dart is in data/models/', () {
              final file = File('lib/data/models/canvas_model.dart');
              expect(file.existsSync(), isTrue);
            });
        - id: AC-D-1-2
          description: "ai_provider.dart 出现在 lib/data/models/ 中"
          verification: |
            test('AC-D-1-2: ai_provider.dart is in data/models/', () {
              final file = File('lib/data/models/ai_provider.dart');
              expect(file.existsSync(), isTrue);
            });
        - id: AC-D-1-3
          description: "lib/core/model/ 目录不再存在"
          verification: |
            test('AC-D-1-3: core/model/ directory no longer exists', () {
              final dir = Directory('lib/core/model');
              expect(dir.existsSync(), isFalse);
            });
        - id: AC-D-1-4
          description: "所有 import 引用已更新，flutter analyze 通过"
          verification: "Run: flutter analyze → 0 issues"

    - id: US-D-2
      name: "model_discovery.dart 归入正确的领域层"
      story: |
        作为 RFBrowser 开发者，
        我希望 model_discovery.dart（AI 模型发现逻辑）放在领域层，
        因为它不是持久化数据结构，而是纯领域算法。
      acceptance_criteria:
        - id: AC-D-2-1
          description: "model_discovery.dart 在 lib/core/domain/ 中"
          verification: |
            test('AC-D-2-1: model_discovery.dart is in core/domain/', () {
              final file = File('lib/core/domain/model_discovery.dart');
              expect(file.existsSync(), isTrue);
            });
        - id: AC-D-2-2
          description: "所有对 model_discovery.dart 的 import 已更新"
          verification: "Run: flutter analyze → 0 issues"

  file_changes:
    moves:
      - from: "lib/core/model/canvas_model.dart"
        to: "lib/data/models/canvas_model.dart"
        reason: "CanvasCard/CanvasConnection/CanvasData 均持久化到 .canvas.json 文件"
      - from: "lib/core/model/ai_provider.dart"
        to: "lib/data/models/ai_provider.dart"
        reason: "AIProvider/AIModel 持久化到 SharedPreferences"
      - from: "lib/core/model/model_discovery.dart"
        to: "lib/core/domain/model_discovery.dart"
        reason: "纯领域逻辑，无持久化"
    deletes:
      - "lib/core/model/" (directory, after moves)
    import_updates:
      - "lib/services/canvas_service.dart: update canvas_model import"
      - "lib/services/ai_service.dart: update ai_provider import"
      - "lib/services/settings_service.dart: update ai_provider import"
      - "lib/services/connectivity_service.dart: update ai_provider import"
      - "lib/ui/pages/canvas_page.dart: update canvas_model import"
      - "lib/ui/pages/settings/ai_settings_section.dart: update ai_provider import"
      - "lib/core/model/canvas_model.dart → any file importing it"
      - "All test files referencing these paths"

  implementation_steps:
    - step: 1
      action: "创建 lib/core/domain/ 目录"
    - step: 2
      action: "移动 model_discovery.dart → lib/core/domain/model_discovery.dart"
    - step: 3
      action: "移动 ai_provider.dart → lib/data/models/ai_provider.dart"
    - step: 4
      action: "移动 canvas_model.dart → lib/data/models/canvas_model.dart"
    - step: 5
      action: "删除空的 lib/core/model/ 目录"
    - step: 6
      action: "全局搜索替换所有受影响的 import 路径"
    - step: 7
      action: "运行 flutter analyze → 确保 0 issues"
    - step: 8
      action: "运行所有测试 → flutter test → 确保全部通过"

# ============================================================================
# Epic F: 让基因组呼吸 —— "有机秩序"
# ============================================================================
Epic_F:
  id: Epic-F
  name: "让基因组呼吸"
  alexander_principle: "有机秩序 —— 规则只应在被需要时出现，而非预先书写整棵树的蓝图"
  alexander_quote: >
    "一个种子如果包含了整棵树的蓝图，它就不是种子了——它是树的木乃伊。"
  problem: |
    genome.yaml 中 36 条约束，大部分从未被触发（last_triggered: null）。
    这些未经验的规则制造了"虚假的完整感"，让活着的系统开始窒息。
    实际被触发过的约束 < 10 条，许多可能是过度工程化的。
  target: |
    - genome.yaml 中只有"活的"约束（曾触发过或已验证需要）
    - 休眠约束归档到单独文件
    - 建立每月审查机制

  user_stories:
    - id: US-F-1
      name: "活着的约束保持活跃，休眠的约束归档"
      story: |
        作为项目维护者，
        我希望 genome.yaml 只包含被实际触发过的约束，
        这样 Agent 在执行时不会被无关规则干扰。
      acceptance_criteria:
        - id: AC-F-1-1
          description: "genome.yaml 中的活跃约束 ≤ 20 条"
          verification: |
            test('AC-F-1-1: active constraints <= 20', () {
              final genome = loadYaml(File('seeds/evolution/genome.yaml').readAsStringSync());
              final constraints = (genome['harness_genome']['constraints'] as List)
                  .where((c) => c['status'] != 'dormant');
              expect(constraints.length, lessThanOrEqualTo(20));
            });
        - id: AC-F-1-2
          description: "每条活跃约束的 trigger_count >= 1 或 status='verified-needed'"
          verification: |
            test('AC-F-1-2: every active constraint has trigger_count >= 1 or is verified-needed', () {
              final genome = loadYaml(File('seeds/evolution/genome.yaml').readAsStringSync());
              final constraints = (genome['harness_genome']['constraints'] as List)
                  .where((c) => c['status'] != 'dormant' && c['status'] != null);
              for (final c in constraints) {
                final count = c['trigger_count'] as int? ?? 0;
                final status = c['status'] as String? ?? '';
                expect(count >= 1 || status == 'verified-needed', isTrue,
                    reason: 'Constraint ${c['id']} is active but has trigger_count=0 and status="$status"');
              }
            });
        - id: AC-F-1-3
          description: "休眠约束归档文件存在"
          verification: |
            test('AC-F-1-3: dormant constraints archive exists', () {
              final file = File('seeds/evolution/dormant-constraints.yaml');
              expect(file.existsSync(), isTrue);
            });

    - id: US-F-2
      name: "约束有明确的状态标记"
      story: |
        作为 AI Agent，
        我希望每条约束有 status 字段（active/dormant/verified-needed/archived），
        这样我能快速判断应该关注哪些规则。
      acceptance_criteria:
        - id: AC-F-2-1
          description: "所有约束都有 status 字段"
          verification: |
            test('AC-F-2-1: every constraint has a status field', () {
              final genome = loadYaml(File('seeds/evolution/genome.yaml').readAsStringSync());
              final constraints = genome['harness_genome']['constraints'] as List;
              for (final c in constraints) {
                expect(c.containsKey('status'), isTrue,
                    reason: 'Constraint ${c['id']} is missing status field');
              }
            });
        - id: AC-F-2-2
          description: "status 值在允许范围内"
          verification: |
            test('AC-F-2-2: status values are valid', () {
              final validStatuses = ['active', 'dormant', 'verified-needed', 'archived'];
              final genome = loadYaml(File('seeds/evolution/genome.yaml').readAsStringSync());
              final constraints = genome['harness_genome']['constraints'] as List;
              for (final c in constraints) {
                expect(validStatuses.contains(c['status']), isTrue,
                    reason: 'Constraint ${c['id']} has invalid status: ${c['status']}');
              }
            });

    - id: US-F-3
      name: "orchestrator.py 支持休眠约束过滤"
      story: |
        作为项目维护者，
        我希望 --check-constraints 只报告活跃约束的违规，
        不被休眠约束的噪声淹没。
      acceptance_criteria:
        - id: AC-F-3-1
          description: "--check-constraints 只报告 status=active 的违规"
          verification: |
            test('AC-F-3-1: --check-constraints only reports active constraint violations', () {
              final result = Process.runSync('python', ['seeds/orchestrator.py', '--check-constraints']);
              final output = result.stdout as String;
              // 确保没有 dormant 约束出现在违规报告中
              // 注意：这不是 dart 测试，这是 shell 验证命令
              expect(result.exitCode, 0);
            });
            验证命令: python seeds/orchestrator.py --check-constraints | grep -c "dormant"
            预期结果: 0 (没有 dormant 约束出现在违规报告)

  file_changes:
    modify:
      - file: "seeds/evolution/genome.yaml"
        changes:
          - "为每条约束添加 status 字段"
          - "从未触发且非关键约束 → status: dormant"
          - "已触发过的约束 → status: active"
          - "标记为 verified-needed 但未验证的 → status: verified-needed"
    create:
      - file: "seeds/evolution/dormant-constraints.yaml"
        content: "归档的休眠约束及其归档原因和日期"
    modify:
      - file: "seeds/orchestrator.py"
        changes:
          - "--check-constraints 过滤 status!=active 的约束"
          - "--status 显示 active/dormant/verified-needed 计数"

  implementation_steps:
    - step: 1
      action: "审查 36 条约束，分类为 active / dormant / verified-needed"
    - step: 2
      action: "为 genome.yaml 每条约束添加 status 字段"
    - step: 3
      action: "创建 seeds/evolution/dormant-constraints.yaml 归档休眠约束"
    - step: 4
      action: "修改 orchestrator.py --check-constraints 过滤逻辑"
    - step: 5
      action: "运行 python seeds/orchestrator.py --check-constraints → 确认只报告活跃违规"
    - step: 6
      action: "运行 python seeds/orchestrator.py --status → 确认状态显示正确"

# ============================================================================
# Epic E: 修剪服务层 —— "房间不是墙内的空洞"
# ============================================================================
Epic_E:
  id: Epic-E
  name: "修剪服务层"
  alexander_principle: "一栋有 19 个房间的房子并不比一栋有 6 个的宜居 —— 空的房间只是墙内的空洞"
  alexander_quote: >
    "如果有些房间从来没有人进入，它们就不是'房间'——它们是墙内的空洞。"
  problem: |
    lib/services/ 有 19 个服务文件。根据 AGENTS.md UX-1 规则：
    "每一个后端服务必须至少有一个用户可访问的触发器"。
    怀疑 template_service, update_check_service, plugin_registry_service,
    skill_service 等没有实际用户触发器或功能未被调用。
  target: |
    - 每个服务文件必须 (1) 被实际调用 + (2) 有用户触发器
    - 未使用的服务删除或归档
    - 功能重叠的服务合并
    - 通过静态分析脚本可验证

  user_stories:
    - id: US-E-1
      name: "审计所有服务的使用状态"
      story: |
        作为项目维护者，
        我希望知道哪些服务被实际使用、哪些是死代码，
        这样我才能决定删除或保留。
      acceptance_criteria:
        - id: AC-E-1-1
          description: "存在自动化的服务使用审计脚本"
          verification: |
            test('AC-E-1-1: service audit script exists and is runnable', () {
              final result = Process.runSync('python', ['seeds/tools/audit_services.py']);
              expect(result.exitCode, 0);
            });
        - id: AC-E-1-2
          description: "审计报告列出每个服务文件的使用状态"
          verification: |
            test('AC-E-1-2: audit report contains all service files', () {
              final serviceDir = Directory('lib/services');
              final serviceFiles = serviceDir.listSync()
                  .whereType<File>()
                  .where((f) => f.path.endsWith('.dart'))
                  .map((f) => p.basename(f.path))
                  .toList();
              final report = File('seeds/memory/service-audit.yaml');
              final content = loadYaml(report.readAsStringSync());
              for (final svc in serviceFiles) {
                expect(content.containsKey(svc), isTrue,
                    reason: 'Service $svc not found in audit report');
              }
            });

    - id: US-E-2
      name: "删除未使用且无用户触发器的服务"
      story: |
        作为 RFBrowser 开发者，
        我希望代码库中没有死代码服务，
        这样导航和理解代码库的成本更低。
      acceptance_criteria:
        - id: AC-E-2-1
          description: "每个保留的服务文件至少有 1 个用户触发器和 1 个调用方"
          verification: "通过审计脚本验证：每个服务 → referenced_by >= 1 AND has_user_trigger == true"
        - id: AC-E-2-2
          description: "删除后 flutter analyze 通过"
          verification: "Run: flutter analyze → 0 issues"
        - id: AC-E-2-3
          description: "删除后所有现有测试通过"
          verification: "Run: flutter test → all pass"

    - id: US-E-3
      name: "合并功能重叠的服务"
      story: |
        作为 RFBrowser 开发者，
        我希望 thin-wrapper 服务被合并到核心服务中，
        以减少文件切换和理解成本。
      acceptance_criteria:
        - id: AC-E-3-1
          description: "服务数量 ≤ 14 个（从 19 减少至少 5 个）"
          verification: |
            test('AC-E-3-1: at most 14 service files remain', () {
              final serviceDir = Directory('lib/services');
              final count = serviceDir.listSync()
                  .whereType<File>()
                  .where((f) => f.path.endsWith('.dart') && !f.path.endsWith('_stub.dart'))
                  .length;
              expect(count, lessThanOrEqualTo(14));
            });

  service_audit_plan:
    # 对每一个服务文件的三问审查
    questions:
      - "是否被 lib/ 中任何代码 import？（静态引用检查）"
      - "是否有用户可访问的触发器？（按钮/菜单/快捷键/命令栏）"
      - "是否可以合并到另一个服务？（薄封装 / 功能重叠）"

    # 审查结果（待验证）
    candidates_for_deletion:
      - file: "template_service.dart"
        reason: "UX-1: 是否有用户触发器可创建/使用模板？若无，删除"
      - file: "update_check_service.dart"
        reason: "功能可能未实现或未被调用；桌面应用更新检查可能不属于核心"
      - file: "plugin_registry_service.dart"
        reason: "插件系统中的注册逻辑可能属于 plugin_host"

    candidates_for_merge:
      - from: "clipper_service.dart"
        into: "knowledge_service.dart"
        reason: "clipper_service 的功能（clipToNote）实际在 knowledge_service 中实现"
      - from: "quick_move_service.dart"
        into: "独立保持（功能完整，有 US + AC 覆盖）"
        reason: "quick move 有完整的 CRUD + UI，功能自治"

    confirmed_keep:
      - "knowledge_service.dart"
      - "ai_service.dart"
      - "browser_service.dart"
      - "canvas_service.dart"
      - "settings_service.dart"
      - "shortcut_service.dart"
      - "git_sync_service.dart"
      - "webdav_sync_service.dart"
      - "agent_service.dart"
      - "connectivity_service.dart"
      - "embedding_service.dart"
      - "database_init.dart"
      - "tantivy_bridge.dart"

  file_changes:
    create:
      - file: "seeds/tools/audit_services.py"
        content: "Python 脚本：扫描所有服务文件的 import 关系和用户触发器"
    delete:
      - "lib/services/template_service.dart" (待审计确认)
      - "lib/services/update_check_service.dart" (待审计确认)
      - "lib/services/plugin_registry_service.dart" (待审计确认)
      - "lib/services/clipper_service.dart" (功能已迁移到 knowledge_service)
      - "lib/services/skill_service.dart" (待审计确认)
    modify:
      - "lib/services/knowledge_service.dart"
        changes: "吸收 clipper_service 和 skill_service 的有效功能"
      - "lib/plugins/host/plugin_host.dart"
        changes: "吸收 plugin_registry_service 的注册逻辑"

  implementation_steps:
    - step: 1
      action: "编写 seeds/tools/audit_services.py 审计脚本"
    - step: 2
      action: "运行审计脚本 → 生成 seeds/memory/service-audit.yaml"
    - step: 3
      action: "根据审计结果，逐个确认要删除的服务"
    - step: 4
      action: "将合并目标的代码迁移到目标文件"
    - step: 5
      action: "删除确认无用的服务文件"
    - step: 6
      action: "更新所有受影响的 import"
    - step: 7
      action: "运行 flutter analyze → 确保 0 issues"
    - step: 8
      action: "运行 flutter test → 确保全部通过"

# ============================================================================
# Epic B: 分解 KnowledgeNotifier —— "层级中心"
# ============================================================================
Epic_B:
  id: Epic-B
  name: "分解 KnowledgeNotifier"
  alexander_principle: "每一个活着的结构都有层次分明的尺度 —— 当一个中心过大而缺乏内部子中心时，它就死了"
  alexander_quote: >
    "一个真正有活力的建筑，它的中心应该像俄罗斯套娃一样——
    一个大中心内部包含着若干次级中心。"
  problem: |
    KnowledgeNotifier（270 行）是一个神对象。
    它同时处理：笔记 CRUD、链接解析与索引、全文搜索、本地图计算、
    未链接提及发现、每日笔记、网页剪藏。
    问题：
    1. 单一 state 对象导致无关更新（搜索触发笔记列表重建）
    2. 难以独立测试各个子功能
    3. 新增功能不断挤进同一个 Notifier
  target: |
    拆分为 3 个独立 Notifier，各自管理自己的 state：
    - NoteNotifier — 笔记 CRUD、加载、活动笔记管理
    - LinkNotifier — 链接提取、解析、反向链接、出链、图谱
    - SearchNotifier — 全文搜索、混合搜索、搜索结果

