version: 1
description: >
  克里斯托弗·亚历山大的六个重构史诗 —— 从"施工脚手架"到"活着的建筑"。
  每个史诗包含完整的 User Story、可自动化验证的验收标准（AC）、
  文件变更清单、实施步骤与依赖关系。
created_at: "2026-05-06"
status: proposed

